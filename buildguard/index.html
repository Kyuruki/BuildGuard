    <title>BillGuard — Check your medical bill against Medicare rates</title>
    <!-- Static brand defaults for no-JS social unfurlers (Slack/iMessage/Twitter/etc.).
         Seo.jsx sets per-route <title> + canonical at runtime for JS-capable crawlers. -->
    <meta
      name="description"
      content="Upload a medical or dental bill and check its charges against official CMS Medicare reference rates. See likely overcharges and draft a dispute letter — free, anonymous, nothing stored."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BillGuard" />
    <meta property="og:title" content="BillGuard — Check your medical bill against Medicare rates" />
    <meta
      property="og:description"
      content="Check a medical bill against official CMS Medicare reference rates, see likely overcharges, and draft a dispute letter. Free, anonymous, nothing stored."
    />
    <meta property="og:url" content="https://billguard.kyuruki.cc/" />
    <meta property="og:image" content="https://billguard.kyuruki.cc/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BillGuard — Check your medical bill against Medicare rates" />
    <meta
      name="twitter:description"
      content="Check a medical bill against official CMS Medicare reference rates, see likely overcharges, and draft a dispute letter."
    />
    <meta name="twitter:image" content="https://billguard.kyuruki.cc/og.png" />
    <script type="application/ld+json">
      [
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "BillGuard",
          "url": "https://billguard.kyuruki.cc",
          "logo": "https://billguard.kyuruki.cc/icon-512.png",
          "description": "An independent, informational tool that checks medical bills against CMS Medicare reference rates."
        },
        {
          "@context": "https://schema.org",
          "@type": "WebApplication",
          "name": "BillGuard",
          "url": "https://billguard.kyuruki.cc",
          "applicationCategory": "HealthApplication",
          "operatingSystem": "Web",
          "browserRequirements": "Requires JavaScript",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "description": "Upload a medical or dental bill and check its charges against official CMS Medicare reference rates, then generate a dispute letter. Anonymous; nothing is stored."
        }
      ]
    </script>
